# Cirrus CI — donate compute to Bull4Life (free community cluster for public repos).
# Setup: cirrus-ci.com -> sign in with GitHub -> install the Cirrus app on this repo.
# Link your account: set B4L_EMAIL in the Cirrus repo Settings -> Environment (keeps it out of this file).
donate_task:
  timeout_in: 60m
  container:
    image: python:3.12-slim
    cpu: 2
    memory: 6G
  env:
    B4L_COORDINATOR: https://compute.bull4life.com
    B4L_NICKNAME: "Bull4Life Cirrus"
    B4L_NODE_ID: bull4life-cirrus
    B4L_POWER: "100"
    # B4L_EMAIL: set in Cirrus repo Environment settings (not here — privacy)
  donate_script:
    - apt-get update -qq && apt-get install -y -qq curl
    - curl -fsSL https://github.com/Bull4Life/bull4life-donate/releases/download/v1.7.0/b4l_node-linux -o b4l_node
    - chmod +x b4l_node
    - timeout 3300 ./b4l_node --run || true
